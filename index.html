<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <div class="cell">
            <h3>6.8</h3>
        </div>
        <div class="cell">
            <h4 class="location">Delhi</h4>
            <h4 class="date">2026-03-11 12:29</h4>
        </div>
        <div class="cell">
            <img src="https://cdn.weatherapi.com/weather/64x64/night/143.png" alt="weather img">
            <h5 class="weather">Clear</h5>
        </div>
    </main>
    <form>
        <label>
            <input type="text" placeholder="Search Location">
        </label>
        <button>Search</button>
    </form>

    <script src="./script.js"></script>
</body>
</html>
